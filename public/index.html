<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite WhatsApp Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>.pulsing-dot { animation: pulse 1.5s infinite; } @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-20">
    <div class="max-w-7xl mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8">

        <div class="w-full lg:w-1/3 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fa-brands fa-whatsapp text-green-500 text-2xl mr-2"></i> Connection</h2>
                <div class="text-center p-4 bg-slate-50 rounded-xl border">
                    <div id="status-badge" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-gray-100 text-gray-700 mb-4">
                        <div class="w-2 h-2 rounded-full bg-gray-500 mr-2 pulsing-dot"></div> Loading...
                    </div>
                    <img id="qr-code" class="mx-auto hidden border-4 border-white rounded-xl shadow-sm w-48" alt="QR Code">
                </div>
                <button onclick="logoutBot()" class="mt-4 w-full bg-red-50 text-red-600 hover:bg-red-100 py-2 rounded-lg text-sm font-semibold transition hidden" id="logout-btn">
                    <i class="fa-solid fa-rotate-right mr-1"></i> Factory Reset & Disconnect
                </button>
            </div>

            <div class="bg-slate-900 p-4 rounded-2xl shadow-xl border border-slate-800 flex flex-col h-80">
                <div class="flex justify-between items-center mb-3 border-b border-slate-700 pb-2">
                    <h2 class="text-sm font-bold text-slate-300"><i class="fa-solid fa-terminal text-green-400 mr-2"></i> Live Server Logs</h2>
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                </div>
                <div id="terminal-output" class="flex-1 overflow-y-auto text-xs font-mono text-green-400 space-y-1 pr-2">
                    <div>[System] Connecting to stream...</div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-2/3 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
                <div>
                    <h2 class="font-bold text-lg">Bot Master Switch</h2>
                    <p class="text-sm text-slate-500">Turn off if you want to answer messages manually.</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="botActive" class="sr-only peer">
                    <div class="w-14 h-7 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-500"></div>
                </label>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-money-bill-wave text-slate-400 mr-2"></i> Payment Flow</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Trigger Command</label>
                        <input type="text" id="triggerCommand" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none font-mono">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Admin Phone (For Receipts)</label>
                        <input type="text" id="adminPhone" placeholder="e.g. 1234567890" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                </div>

                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-slate-700 text-sm">Active Wallets</h3>
                    <button onclick="addWalletRow()" class="text-xs bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg hover:bg-slate-200 font-semibold transition"><i class="fa-solid fa-plus"></i> Add Wallet</button>
                </div>
                <div id="wallets-container" class="space-y-3"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-lg font-bold text-slate-800"><i class="fa-solid fa-robot text-slate-400 mr-2"></i> Custom Auto-Responders</h2>
                    <button onclick="addCommandRow()" class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg hover:bg-indigo-100 font-semibold transition"><i class="fa-solid fa-plus"></i> Add Command</button>
                </div>
                <p class="text-sm text-slate-500 mb-4">Create dynamic commands like <code class="bg-slate-100 px-1 rounded">!help</code> or <code class="bg-slate-100 px-1 rounded">!website</code> to instantly reply to users.</p>
                <div id="commands-container" class="space-y-3"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2"><i class="fa-solid fa-comment-dots text-slate-400 mr-2"></i> Payment Dialogues</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Group Handoff Message <span class="text-xs font-normal text-slate-400 ml-2">(@user auto-tags them)</span></label>
                        <textarea id="groupReply" rows="2" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm text-slate-600"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Direct Message Menu Greeting</label>
                        <textarea id="dmMenu" rows="3" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm text-slate-600"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Payment Rules (Under QR Code)</label>
                        <textarea id="successText" rows="3" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm text-slate-600"></textarea>
                    </div>
                </div>
            </div>

            <button onclick="saveAllSettings()" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-bold text-lg shadow-lg transition-all transform hover:scale-[1.01]">
                <i class="fa-solid fa-floppy-disk mr-2"></i> Save All Configurations
            </button>
        </div>
    </div>

    <script>
        let currentConfig = {};
        const API_STATUS = 'api/status';
        const API_CONFIG = 'api/config';
        const API_LOGOUT = 'api/logout';
        const API_LOGS = 'api/logs';

        async function safeFetch(url, options = {}) {
            try {
                const response = await fetch(url, {
                    ...options,
                    cache: 'no-store',
                    credentials: 'same-origin',
                    headers: {
                        'Pragma': 'no-cache',
                        'Cache-Control': 'no-store, no-cache, must-revalidate',
                        ...(options.headers || {})
                    }
                });

                const text = await response.text();

                try {
                    return JSON.parse(text);
                } catch (err) {
                    console.error(`[API Parse Error] Received non-JSON response from ${url}:`, text);
                    return null;
                }
            } catch (err) {
                console.error(`[Network Error] Failed to fetch ${url}:`, err);
                return null;
            }
        }

        const evtSource = new EventSource(API_LOGS);
        evtSource.onmessage = function(event) {
            const term = document.getElementById('terminal-output');
            const data = JSON.parse(event.data);
            const colorClass = data.type === 'error' ? 'text-red-400' : 'text-green-400';
            term.innerHTML += `<div class="${colorClass} py-0.5">${data.msg}</div>`;
            term.scrollTop = term.scrollHeight;
        };

        async function fetchStatus() {
            const data = await safeFetch(API_STATUS);
            if (data) updateStatusUI(data);
        }

        function updateStatusUI(data) {
            const badge = document.getElementById('status-badge');
            const qrImg = document.getElementById('qr-code');
            const logoutBtn = document.getElementById('logout-btn');

            if (data.status === 'connected') {
                badge.className = "inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-green-100 text-green-700 mb-4";
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500 mr-2"></div> Connected & Active';
                qrImg.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
            } else if (data.status === 'qr') {
                badge.className = "inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-yellow-100 text-yellow-700 mb-4";
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-yellow-500 mr-2 pulsing-dot"></div> Waiting for WhatsApp Scan';
                qrImg.src = data.qrCodeUrl;
                qrImg.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
            } else {
                badge.className = "inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-slate-100 text-slate-700 mb-4";
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-slate-500 mr-2 pulsing-dot"></div> Booting Engine...';
                qrImg.classList.add('hidden');
            }
        }

        async function loadConfig() {
            const data = await safeFetch(API_CONFIG);

            if (!data) {
                document.getElementById('status-badge').innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500 mr-2"></div> API Error. Check Console.';
                return;
            }

            currentConfig = data;

            document.getElementById('botActive').checked = currentConfig.botActive;
            document.getElementById('triggerCommand').value = currentConfig.triggerCommand;
            document.getElementById('adminPhone').value = currentConfig.adminPhone || "";
            document.getElementById('groupReply').value = currentConfig.messages.groupReply;
            document.getElementById('dmMenu').value = currentConfig.messages.dmMenu;
            document.getElementById('successText').value = currentConfig.messages.successText;

            renderWallets();
            renderCommands();
        }

        function renderWallets() {
            const container = document.getElementById('wallets-container');
            container.innerHTML = '';
            if(!currentConfig.wallets) return;
            Object.entries(currentConfig.wallets).forEach(([name, addr]) => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="flex gap-2 wallet-row bg-slate-50 p-2 rounded-lg border border-slate-100">
                        <input type="text" class="w-1/3 p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-green-500 outline-none font-bold text-sm bg-white" value="${name}">
                        <input type="text" class="w-full p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-green-500 outline-none text-sm font-mono bg-white" value="${addr}">
                        <button onclick="this.parentElement.remove()" class="text-slate-400 px-3 py-2 rounded-md hover:bg-red-50 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `);
            });
        }

        function addWalletRow() {
            document.getElementById('wallets-container').insertAdjacentHTML('beforeend', `
                <div class="flex gap-2 wallet-row bg-blue-50 p-2 rounded-lg border border-blue-100">
                    <input type="text" class="w-1/3 p-2 border border-blue-200 rounded-md focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm bg-white" placeholder="Network (e.g. SOL)">
                    <input type="text" class="w-full p-2 border border-blue-200 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono bg-white" placeholder="Wallet Address">
                    <button onclick="this.parentElement.remove()" class="text-slate-400 px-3 py-2 rounded-md hover:bg-red-50 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                </div>
            `);
        }

        function renderCommands() {
            const container = document.getElementById('commands-container');
            container.innerHTML = '';
            if(!currentConfig.customCommands) return;
            Object.entries(currentConfig.customCommands).forEach(([cmd, reply]) => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="flex flex-col md:flex-row gap-2 command-row bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <input type="text" class="md:w-1/4 p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none font-bold font-mono text-sm bg-white" value="${cmd}">
                        <textarea class="w-full p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none text-sm bg-white" rows="2">${reply}</textarea>
                        <button onclick="this.parentElement.remove()" class="text-slate-400 px-3 py-2 rounded-md hover:bg-red-50 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `);
            });
        }

        function addCommandRow() {
            document.getElementById('commands-container').insertAdjacentHTML('beforeend', `
                <div class="flex flex-col md:flex-row gap-2 command-row bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                    <input type="text" class="md:w-1/4 p-2 border border-indigo-200 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none font-bold font-mono text-sm bg-white" placeholder="!command">
                    <textarea class="w-full p-2 border border-indigo-200 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none text-sm bg-white" rows="2" placeholder="The text the bot should reply with..."></textarea>
                    <button onclick="this.parentElement.remove()" class="text-slate-400 px-3 py-2 rounded-md hover:bg-red-50 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                </div>
            `);
        }

        async function saveAllSettings() {
            const btn = document.querySelector('button[onclick="saveAllSettings()"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving & Syncing...';

            const newWallets = {};
            document.querySelectorAll('.wallet-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value.trim() && inputs[1].value.trim()) newWallets[inputs[0].value.trim()] = inputs[1].value.trim();
            });

            const newCommands = {};
            document.querySelectorAll('.command-row').forEach(row => {
                const cmd = row.querySelector('input').value.trim();
                const reply = row.querySelector('textarea').value.trim();
                if (cmd && reply) newCommands[cmd] = reply;
            });

            const updatedConfig = {
                botActive: document.getElementById('botActive').checked,
                triggerCommand: document.getElementById('triggerCommand').value,
                adminPhone: document.getElementById('adminPhone').value,
                wallets: newWallets,
                customCommands: newCommands,
                messages: {
                    groupReply: document.getElementById('groupReply').value,
                    dmMenu: document.getElementById('dmMenu').value,
                    successText: document.getElementById('successText').value
                }
            };

            await safeFetch(API_CONFIG, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedConfig)
            });

            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Synced Successfully!';
            setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-2"></i> Save All Configurations'; }, 2000);
        }

        async function logoutBot() {
            if(confirm('🚨 WARNING: This wipes the WhatsApp session. You MUST re-scan the QR code. Proceed?')) {
                await safeFetch(API_LOGOUT, { method: 'POST' });
                document.getElementById('status-badge').innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Container Rebooting...';
                setTimeout(() => window.location.reload(), 15000);
            }
        }

        loadConfig();
        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
