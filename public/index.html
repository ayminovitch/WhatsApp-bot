<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .pulsing-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
    <div class="max-w-6xl mx-auto p-6 flex flex-col md:flex-row gap-6 mt-8">

        <!-- SIDEBAR / STATUS -->
        <div class="w-full md:w-1/3 space-y-6">
            <div class="glass p-6 rounded-2xl shadow-xl border border-gray-200">
                <h2 class="text-xl font-bold mb-4 flex items-center text-gray-700">
                    <i class="fa-brands fa-whatsapp text-green-500 text-2xl mr-2"></i> Connection
                </h2>

                <div id="status-container" class="text-center p-4 bg-gray-50 rounded-xl border">
                    <p class="text-sm text-gray-500 mb-2">Current Status</p>
                    <div id="status-badge" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-yellow-100 text-yellow-700 mb-4">
                        <div class="w-2 h-2 rounded-full bg-yellow-500 mr-2 pulsing-dot"></div> Loading...
                    </div>
                    <img id="qr-code" class="mx-auto hidden border-4 border-white rounded-xl shadow-sm" alt="QR Code">
                    <p id="qr-text" class="text-xs text-gray-500 mt-3 hidden">Scan with WhatsApp to link bot.</p>
                </div>
                <button onclick="logoutBot()" class="mt-4 w-full bg-red-50 text-red-600 hover:bg-red-100 py-2 rounded-lg text-sm font-semibold transition hidden" id="logout-btn">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i> Disconnect Bot
                </button>
            </div>

            <div class="glass p-6 rounded-2xl shadow-xl border border-gray-200">
                <h2 class="text-xl font-bold mb-4 text-gray-700"><i class="fa-solid fa-sliders mr-2"></i> Settings</h2>
                <div class="flex items-center justify-between mb-4">
                    <span class="font-medium">Bot Active (Away Mode)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="botActive" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                    </label>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Trigger Command</label>
                    <input type="text" id="triggerCommand" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT (WALLETS & FLOW) -->
        <div class="w-full md:w-2/3 space-y-6">
            <div class="glass p-6 rounded-2xl shadow-xl border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-700"><i class="fa-solid fa-wallet mr-2"></i> Wallets</h2>
                    <button onclick="addWalletRow()" class="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded hover:bg-blue-100 font-semibold transition"><i class="fa-solid fa-plus"></i> Add Wallet</button>
                </div>
                <div id="wallets-container" class="space-y-3"></div>
            </div>

            <div class="glass p-6 rounded-2xl shadow-xl border border-gray-200">
                <h2 class="text-xl font-bold mb-4 text-gray-700"><i class="fa-solid fa-comment-dots mr-2"></i> Bot Responses</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Group Hand-off Message (@user auto-mentions)</label>
                        <textarea id="groupReply" rows="2" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">DM Greeting Menu</label>
                        <textarea id="dmMenu" rows="3" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Payment Success Prefix</label>
                        <input type="text" id="successText" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm">
                    </div>
                </div>
            </div>

            <button onclick="saveAllSettings()" class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-bold text-lg shadow-lg transition-all transform hover:scale-[1.01]">
                <i class="fa-solid fa-floppy-disk mr-2"></i> Save All Configurations
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        let currentConfig = {};

        // 1. Fetch & Poll Status
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateStatusUI(data);
            } catch (e) { console.error("API Offline"); }
        }

        function updateStatusUI(data) {
            const badge = document.getElementById('status-badge');
            const qrImg = document.getElementById('qr-code');
            const qrText = document.getElementById('qr-text');
            const logoutBtn = document.getElementById('logout-btn');

            if (data.status === 'connected') {
                badge.className = "inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-green-100 text-green-700 mb-4";
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500 mr-2"></div> Connected';
                qrImg.classList.add('hidden');
                qrText.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
            } else if (data.status === 'qr') {
                badge.className = "inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-yellow-100 text-yellow-700 mb-4";
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-yellow-500 mr-2 pulsing-dot"></div> Waiting for Scan';
                qrImg.src = data.qrCodeUrl;
                qrImg.classList.remove('hidden');
                qrText.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
            } else {
                badge.className = "inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-gray-100 text-gray-700 mb-4";
                badge.innerHTML = '<div class="w-2 h-2 rounded-full bg-gray-500 mr-2 pulsing-dot"></div> Initializing...';
                qrImg.classList.add('hidden');
                qrText.classList.add('hidden');
            }
        }

        // 2. Load Config Settings
        async function loadConfig() {
            const res = await fetch('/api/config');
            currentConfig = await res.json();

            document.getElementById('botActive').checked = currentConfig.botActive;
            document.getElementById('triggerCommand').value = currentConfig.triggerCommand;
            document.getElementById('groupReply').value = currentConfig.messages.groupReply;
            document.getElementById('dmMenu').value = currentConfig.messages.dmMenu;
            document.getElementById('successText').value = currentConfig.messages.successText;

            renderWallets();
        }

        function renderWallets() {
            const container = document.getElementById('wallets-container');
            container.innerHTML = '';
            Object.entries(currentConfig.wallets).forEach(([name, addr]) => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="flex gap-2 wallet-row">
                        <input type="text" class="w-1/3 p-2 border rounded focus:ring-1 focus:ring-green-500 outline-none font-medium text-sm" value="${name}" placeholder="Coin Name (e.g. BTC)">
                        <input type="text" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500 outline-none text-sm font-mono" value="${addr}" placeholder="Wallet Address">
                        <button onclick="this.parentElement.remove()" class="bg-red-50 text-red-500 px-3 py-2 rounded hover:bg-red-100 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `);
            });
        }

        function addWalletRow() {
            document.getElementById('wallets-container').insertAdjacentHTML('beforeend', `
                <div class="flex gap-2 wallet-row">
                    <input type="text" class="w-1/3 p-2 border rounded focus:ring-1 focus:ring-green-500 outline-none font-medium text-sm" placeholder="Coin Name">
                    <input type="text" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500 outline-none text-sm font-mono" placeholder="Wallet Address">
                    <button onclick="this.parentElement.remove()" class="bg-red-50 text-red-500 px-3 py-2 rounded hover:bg-red-100 transition"><i class="fa-solid fa-trash"></i></button>
                </div>
            `);
        }

        async function saveAllSettings() {
            const btn = document.querySelector('button[onclick="saveAllSettings()"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving...';

            const newWallets = {};
            document.querySelectorAll('.wallet-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value.trim() && inputs[1].value.trim()) {
                    newWallets[inputs[0].value.trim()] = inputs[1].value.trim();
                }
            });

            const updatedConfig = {
                botActive: document.getElementById('botActive').checked,
                triggerCommand: document.getElementById('triggerCommand').value,
                wallets: newWallets,
                messages: {
                    groupReply: document.getElementById('groupReply').value,
                    dmMenu: document.getElementById('dmMenu').value,
                    successText: document.getElementById('successText').value
                }
            };

            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedConfig)
            });

            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Saved Successfully!';
            setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-2"></i> Save All Configurations'; }, 2000);
        }

        async function logoutBot() {
            if(confirm('Are you sure you want to disconnect the bot? You will need to re-scan the QR code.')) {
                await fetch('/api/logout', { method: 'POST' });
            }
        }

        // Initialize
        loadConfig();
        fetchStatus();
        setInterval(fetchStatus, 3000); // Poll status every 3 seconds
    </script>
</body>
</html>
